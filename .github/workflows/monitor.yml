name: Monitor Harmonogramu
on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:
jobs:
  run-monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install pandas openpyxl requests beautifulsoup4  # <-- MUSI BYĆ openpyxl
      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python monitor.py
      - name: Commit and Push
        run: |
          git config --global user.name 'PlanBot'
          git config --global user.email 'bot@github.com'
          git add plan_state.json studia.ics || true
          git commit -m "Aktualizacja planu" || exit 0
          git push
